name: Mobile Build (APK & AAB)

on:
  push:
    branches: ["**"]
    tags: ["mobile-v*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

defaults:
  run:
    working-directory: mobile

jobs:
  build:
    name: Build Flutter Android app
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17 (required by AGP 8 / Gradle 8)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Run tests
        run: flutter test

      # ---- Optional: real Firebase config, injected from a repo secret ----
      # Set ANDROID_GOOGLE_SERVICES_JSON_BASE64 (base64 of your real
      # google-services.json) in repo Settings > Secrets to enable this.
      # Without it, the build still succeeds — push notifications just stay
      # disabled at runtime (see lib/main.dart's graceful Firebase fallback).
      - name: Check whether google-services secret is set
        run: echo "HAS_GOOGLE_SERVICES=${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 != '' }}" >> "$GITHUB_ENV"
      - name: Restore google-services.json (if configured)
        if: ${{ env.HAS_GOOGLE_SERVICES == 'true' }}
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json

      # ---- Optional: real release keystore, injected from repo secrets ----
      # Set these 4 secrets to produce a properly-signed, Play-Store-ready
      # release build: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
      # ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD.
      # Without them, the release build falls back to debug signing
      # (perfectly fine for CI smoke-testing / internal QA installs, but
      # NOT acceptable for a Play Store upload — see README "Release Build").
      - name: Check whether release-signing secrets are set
        run: echo "HAS_RELEASE_SIGNING=${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}" >> "$GITHUB_ENV"
      - name: Restore release keystore (if configured)
        if: ${{ env.HAS_RELEASE_SIGNING == 'true' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build APK (release)
        run: flutter build apk --release --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://api.roshetta.ai' }}

      - name: Build AAB (release)
        run: flutter build appbundle --release --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://api.roshetta.ai' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: roshetta-ai-release.apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: roshetta-ai-release.aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ---- CD: attach the build outputs to a GitHub Release on version tags ----
      - name: Create GitHub Release with build artifacts
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mobile/build/app/outputs/flutter-apk/app-release.apk
            mobile/build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
